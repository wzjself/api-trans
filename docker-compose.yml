services:
  api-trans-blue:
    build: .
    container_name: api-trans-blue
    environment: &api_trans_env
      TZ: Asia/Shanghai
      PORT: 3000
      APP_BASE_URL: http://64.23.161.180:18080
      VITE_PUBLIC_API_BASE: http://64.23.161.180:18080
      ADMIN_EMAIL: wzjself
      ADMIN_PASSWORD: wzj147258
      ADMIN_INITIAL_BALANCE: 1000000
      USER_INITIAL_BALANCE: 100000
      TOKEN_SECRET: change-this-secret
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: wzjself
      MYSQL_DATABASE: api_trans
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
      - shared-services

  api-trans-green:
    build: .
    container_name: api-trans-green
    environment: *api_trans_env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - default
      - shared-services

  gateway:
    image: nginx:1.27-alpine
    container_name: api-trans-gateway
    depends_on:
      - api-trans-blue
    environment:
      TZ: Asia/Shanghai
    ports:
      - "18080:80"
    volumes:
      - ./deploy/nginx/nginx.active.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - default
      - shared-services

networks:
  shared-services:
    external: true
